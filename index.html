<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carta de Aniversário 🎂</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
font-family:Georgia,serif;
display:flex;
justify-content:center;
align-items:center;
background:url("foto_fundo.jpg") center/cover no-repeat;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
pointer-events:none;
}

/* envelope */

.envelope-container{
position:relative;
width:220px;
height:140px;
z-index:5;
}

.envelope{
position:absolute;
width:100%;
height:100%;
background:#ffc2d1;
transition:transform .3s;
}

.envelope:hover{
transform:scale(1.08);
}

.flap{
position:absolute;
width:0;
height:0;
border-left:110px solid transparent;
border-right:110px solid transparent;
border-top:80px solid #ff8fab;
top:0;
left:0;
transform-origin:top;
transition:transform .8s;
z-index:5;
}

/* carta pequena dentro */

.inner-letter{
position:absolute;
width:90%;
height:110px;
background:#fff;
left:5%;
top:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
transition:transform 1s ease;
z-index:-1;
}

/* carta grande */

.letter{
position:absolute;
width:92%;
max-width:520px;
background:#fffaf3;
padding:26px 16px;
border-radius:10px;
border:1px solid rgba(0,0,0,0.08);
box-shadow:
0 25px 60px rgba(0,0,0,0.35),
0 5px 15px rgba(0,0,0,0.15);

top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0.2);
opacity:0;

transition:transform 1s ease, opacity 1s ease;

z-index:1;
text-align:center;

background-image:linear-gradient(
rgba(0,0,0,0.02) 1px,
transparent 1px
);
background-size:100% 28px;
}

.letter.show{
opacity:1;
transform:translate(-50%,-50%) scale(1);
}

/* vídeo */

video{
width:100%;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* assinatura */

.signature{
margin-top:10px;
font-size:20px;
font-style:italic;
}

/* estrelas */

.star{
position:absolute;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{

0%{
transform:translateY(-10vh);
opacity:1;
}

100%{
transform:translateY(110vh);
opacity:0.6;
}

}

/* confetes */

.confetti{
position:absolute;
font-size:14px;
animation:confettiFall linear infinite;
}

@keyframes confettiFall{

0%{
transform:translateY(-10vh) rotate(0deg);
opacity:1;
}

100%{
transform:translateY(110vh) rotate(720deg);
opacity:0.8;
}

}

/* explosão */

.explosion{
position:absolute;
font-size:28px;
animation:explode 1.2s forwards;
}

@keyframes explode{

0%{
transform:scale(0);
opacity:1;
}

100%{
transform:translate(var(--x),var(--y)) scale(2);
opacity:0;
}

}

/* selo */

.seal{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#ff4d6d;
color:white;
width:40px;
height:40px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-family:"Times New Roman", Georgia, serif;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
cursor:pointer;
animation:pulse 2s infinite;
z-index:10;
}

@keyframes pulse{

0%{transform:translate(-50%,-50%) scale(1);}
50%{transform:translate(-50%,-50%) scale(1.1);}
100%{transform:translate(-50%,-50%) scale(1);}

}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="envelope-container" id="container">

<div class="inner-letter" id="innerLetter"></div>

<div class="envelope">
<div class="flap" id="flap"></div>
<div class="seal" id="seal">⭐</div>
</div>

</div>

<div class="letter" id="letter">

<video autoplay muted controls playsinline>
<source src="video.mp4" type="video/mp4">
Seu navegador não suporta vídeo.
</video>

<div class="signature">
Feliz cumpleaños, guapa. <br>
Espero que esto al menos te haya traído una sonrisa hoy,<br>
Kryzia 🌼
</div>

</div>

<script>

/* estrelas */

function createStar(){

const star=document.createElement("div")
star.classList.add("star")
star.innerHTML="⭐"

star.style.left=Math.random()*100+"vw"
star.style.animationDuration=(5+Math.random()*5)+"s"

document.body.appendChild(star)

setTimeout(()=>star.remove(),10000)

}

function startStarRain(){
setInterval(createStar,400)
}

/* confetes */

const confettiSymbols=["🎉","🎊","✨","🎈"]

function createConfetti(){

const confetti=document.createElement("div")
confetti.classList.add("confetti")

confetti.innerHTML=confettiSymbols[Math.floor(Math.random()*confettiSymbols.length)]

confetti.style.left=Math.random()*100+"vw"
confetti.style.animationDuration=(4+Math.random()*4)+"s"

document.body.appendChild(confetti)

setTimeout(()=>confetti.remove(),9000)

}

function startConfetti(){
setInterval(createConfetti,250)
}

/* explosão */

function starExplosion(){

for(let i=0;i<30;i++){

const star=document.createElement("div")
star.className="explosion"
star.innerHTML="⭐"

star.style.left="50%"
star.style.top="50%"

const x=(Math.random()*500-250)+"px"
const y=(Math.random()*500-250)+"px"

star.style.setProperty("--x",x)
star.style.setProperty("--y",y)

document.body.appendChild(star)

setTimeout(()=>star.remove(),1200)

}

}

/* elementos */

const seal=document.getElementById("seal")
const flap=document.getElementById("flap")
const innerLetter=document.getElementById("innerLetter")
const letter=document.getElementById("letter")

/* clique */

seal.onclick=()=>{

seal.style.opacity="0"

flap.style.transform="rotateX(-180deg)"

setTimeout(()=>{
innerLetter.style.transform="translateY(-160px)"
},400)

setTimeout(()=>{

document.getElementById("container").style.display="none"

letter.classList.add("show")

starExplosion()
startStarRain()
startConfetti()

},1200)

}

</script>

</body>
</html>
```
